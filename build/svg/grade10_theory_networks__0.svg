    <text x="250" y="323" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">to Internet</text>

    
    <line x1="250" y1="330" x2="250" y2="360" stroke="#333333" stroke-width="2" stroke-dasharray="5,3" />
    <ellipse cx="250" cy="387" rx="60" ry="22" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <ellipse cx="225" cy="375" rx="22" ry="16" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
