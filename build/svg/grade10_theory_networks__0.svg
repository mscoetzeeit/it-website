<svg viewBox="0 0 500 420" width="500.0" style="max-width:500px; display:block; margin:0 auto" aria-label="Star topology diagram: central switch connected to 5 computer nodes" height="420.0" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="420" fill="#ffffff" rx="10" />

    <text x="250" y="26" text-anchor="middle" fill="#111111" font-size="14" font-family="sans-serif" font-weight="bold">Star Topology</text>

    
    <rect x="190" y="170" width="120" height="60" rx="8" fill="#ffffff" stroke="#333333" stroke-width="2.5" />
    <text x="250" y="196" text-anchor="middle" fill="#111111" font-size="12" font-family="sans-serif" font-weight="bold">SWITCH</text>
    <text x="250" y="213" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">Central device</text>

    
    
    <line x1="250" y1="170" x2="250" y2="100" stroke="#333333" stroke-width="2" />
    <rect x="210" y="60" width="80" height="40" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="250" y="78" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">PC 1</text>
    <text x="250" y="93" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Student</text>

    
    <line x1="310" y1="185" x2="390" y2="105" stroke="#333333" stroke-width="2" />
    <rect x="365" y="68" width="80" height="40" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="405" y="86" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">PC 2</text>
    <text x="405" y="101" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Student</text>

    
    <line x1="310" y1="215" x2="395" y2="300" stroke="#333333" stroke-width="2" />
    <rect x="368" y="298" width="80" height="40" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="408" y="316" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">PC 3</text>
    <text x="408" y="331" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Student</text>

    
    <line x1="190" y1="215" x2="105" y2="300" stroke="#333333" stroke-width="2" />
    <rect x="52" y="298" width="80" height="40" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="92" y="316" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">PC 4</text>
    <text x="92" y="331" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Student</text>

    
    <line x1="190" y1="185" x2="110" y2="105" stroke="#333333" stroke-width="2" />
    <rect x="55" y="68" width="80" height="40" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
