    <text x="95" y="101" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Teacher</text>

    
    <line x1="250" y1="230" x2="250" y2="290" stroke="#333333" stroke-width="2" />
    <rect x="195" y="290" width="110" height="40" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
