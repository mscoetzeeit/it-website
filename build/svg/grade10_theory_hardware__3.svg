<svg viewBox="0 0 500 300" width="500.0" style="max-width:500px; display:block; margin:0 auto" aria-label="Memory hierarchy pyramid: CPU cache at top, then RAM, then SSD/HDD at base" height="300.0" xmlns="http://www.w3.org/2000/svg">
        <rect width="500" height="300" fill="#ffffff" rx="10" />

        
        <polygon points="250,20 310,80 190,80" fill="#ffffff" stroke="#333333" stroke-width="2" />
        <text x="250" y="58" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">CPU Cache</text>

        
        <polygon points="190,84 310,84 350,154 150,154" fill="#ffffff" stroke="#333333" stroke-width="2" />
        <text x="250" y="116" text-anchor="middle" fill="#111111" font-size="12" font-family="sans-serif" font-weight="bold">RAM</text>
        <text x="250" y="133" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">4 – 64 GB typical</text>

        
        <polygon points="150,158 350,158 390,228 110,228" fill="#ffffff" stroke="#333333" stroke-width="2" />
        <text x="250" y="188" text-anchor="middle" fill="#111111" font-size="12" font-family="sans-serif" font-weight="bold">SSD / NVMe</text>
        <text x="250" y="205" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">256 GB – 4 TB typical</text>

        
        <polygon points="110,232 390,232 430,280 70,280" fill="#ffffff" stroke="#333333" stroke-width="2" />
        <text x="250" y="258" text-anchor="middle" fill="#111111" font-size="12" font-family="sans-serif" font-weight="bold">HDD / External storage</text>
        <text x="250" y="274" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">1 TB – 20 TB typical</text>

        
        <text x="445" y="50" fill="#111111" font-size="10" font-family="sans-serif" font-weight="bold">Fastest</text>
        <text x="445" y="65" fill="#111111" font-size="9" font-family="sans-serif">MB / ns</text>
        <text x="445" y="270" fill="#111111" font-size="10" font-family="sans-serif" font-weight="bold">Slowest</text>
        <text x="445" y="285" fill="#111111" font-size="9" font-family="sans-serif">TB / ms</text>

        
        <line x1="438" y1="80" x2="438" y2="250" stroke="#333333" stroke-width="1.5" />
        <polygon points="432,250 438,262 444,250" fill="#ffffff" />
        <text x="455" y="170" fill="#111111" font-size="9" font-family="sans-serif" transform="rotate(90,455,170)">Size increases</text>
      </svg>