<svg viewBox="0 0 720 130" width="720.0" style="max-width:720px; display:block; margin:0 auto" aria-label="Network components flow: NIC to cable to switch to router to internet" height="130.0" xmlns="http://www.w3.org/2000/svg">
    <rect width="720" height="130" fill="#ffffff" rx="10" />

    
    <rect x="15" y="35" width="90" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="60" y="57" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">NIC</text>
    <text x="60" y="72" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Network Interface</text>
    <text x="60" y="84" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Card (in PC)</text>
    <text x="60" y="108" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Connects PC to network</text>

    <line x1="105" y1="60" x2="140" y2="60" stroke="#333333" stroke-width="2" />
    <polygon points="138,55 150,60 138,65" fill="#ffffff" />

    
    <rect x="150" y="35" width="90" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="195" y="57" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">Cable</text>
    <text x="195" y="72" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">UTP / Fibre</text>
    <text x="195" y="84" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">optic / Wi-Fi</text>
    <text x="195" y="108" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Physical connection</text>

    <line x1="240" y1="60" x2="275" y2="60" stroke="#333333" stroke-width="2" />
    <polygon points="273,55 285,60 273,65" fill="#ffffff" />

    
    <rect x="285" y="35" width="90" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="330" y="57" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">Switch</text>
    <text x="330" y="72" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Connects devices</text>
    <text x="330" y="84" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">in the LAN</text>
    <text x="330" y="108" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Directs traffic by MAC</text>

    <line x1="375" y1="60" x2="410" y2="60" stroke="#333333" stroke-width="2" />
    <polygon points="408,55 420,60 408,65" fill="#ffffff" />

    
    <rect x="420" y="35" width="90" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="465" y="57" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">Router</text>
    <text x="465" y="72" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Connects LAN</text>
    <text x="465" y="84" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">to internet</text>
    <text x="465" y="108" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Routes by IP address</text>

    <line x1="510" y1="60" x2="545" y2="60" stroke="#333333" stroke-width="2" />
    <polygon points="543,55 555,60 543,65" fill="#ffffff" />

    
    <rect x="555" y="35" width="80" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="595" y="57" text-anchor="middle" fill="#111111" font-size="11" font-family="sans-serif" font-weight="bold">Modem</text>
    <text x="595" y="72" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Converts digital</text>
    <text x="595" y="84" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">↔ analogue</text>
    <text x="595" y="108" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif">Connects to ISP</text>

    <line x1="635" y1="60" x2="660" y2="60" stroke="#333333" stroke-width="2" />
    <polygon points="658,55 670,60 658,65" fill="#ffffff" />

    
    <ellipse cx="695" cy="62" rx="22" ry="16" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="695" y="66" text-anchor="middle" fill="#111111" font-size="9" font-family="sans-serif" font-weight="bold">WWW</text>
  </svg>