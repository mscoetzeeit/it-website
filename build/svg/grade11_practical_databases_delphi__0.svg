<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0 0 640 130" style="width:100%;max-width:640px" width="640.0" height="130.0" xmlns="http://www.w3.org/2000/svg">
      <ns0:rect width="640" height="130" rx="8" fill="#ffffff" />

      
      <ns0:rect x="10" y="30" width="110" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
      <ns0:text x="65" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#111111" font-family="sans-serif">Database</ns0:text>
      <ns0:text x="65" y="68" text-anchor="middle" font-size="10" fill="#111111" font-family="sans-serif">(.accdb file)</ns0:text>
      
      <ns0:line x1="120" y1="55" x2="145" y2="55" stroke="#333333" stroke-width="2" marker-end="url(#arrowV)" />
      
      <ns0:rect x="145" y="30" width="130" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
      <ns0:text x="210" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#111111" font-family="Consolas,monospace">TADOConnection</ns0:text>
      <ns0:text x="210" y="68" text-anchor="middle" font-size="9" fill="#111111" font-family="sans-serif">Opens the file</ns0:text>
      
      <ns0:line x1="275" y1="55" x2="300" y2="55" stroke="#333333" stroke-width="2" marker-end="url(#arrowV)" />
      
      <ns0:rect x="300" y="30" width="110" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
      <ns0:text x="355" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#111111" font-family="Consolas,monospace">TADOTable</ns0:text>
      <ns0:text x="355" y="68" text-anchor="middle" font-size="9" fill="#111111" font-family="sans-serif">One table</ns0:text>
      
      <ns0:line x1="410" y1="55" x2="435" y2="55" stroke="#333333" stroke-width="2" marker-end="url(#arrowV)" />
      
      <ns0:rect x="435" y="30" width="110" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
      <ns0:text x="490" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#111111" font-family="Consolas,monospace">TDataSource</ns0:text>
      <ns0:text x="490" y="68" text-anchor="middle" font-size="9" fill="#111111" font-family="sans-serif">The go-between</ns0:text>
      
      <ns0:line x1="545" y1="55" x2="570" y2="55" stroke="#333333" stroke-width="2" marker-end="url(#arrowV)" />
      
      <ns0:rect x="570" y="30" width="60" height="50" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
      <ns0:text x="600" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#111111" font-family="Consolas,monospace">DBGrid</ns0:text>
      <ns0:text x="600" y="65" text-anchor="middle" font-size="9" fill="#111111" font-family="sans-serif">Table</ns0:text>
      <ns0:text x="600" y="76" text-anchor="middle" font-size="9" fill="#111111" font-family="sans-serif">on screen</ns0:text>

      
      <ns0:text x="320" y="115" text-anchor="middle" font-size="10" fill="#111111" font-family="sans-serif">Data flows from the file on disk → all the way through to the grid your user sees</ns0:text>

      <ns0:defs>
        <ns0:marker id="arrowV" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <ns0:path d="M0,0 L0,6 L8,3 z" fill="#333333" />
        </ns0:marker>
      </ns0:defs>
    </ns0:svg>