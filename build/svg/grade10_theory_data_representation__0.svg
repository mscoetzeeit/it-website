<svg viewBox="0 0 580 130" width="580.0" style="max-width:580px; display:block; margin:0 auto" aria-label="Byte diagram: 8 bit boxes labeled bit 7 to bit 0, showing 01000001 = A" height="130.0" xmlns="http://www.w3.org/2000/svg">
    <rect width="580" height="130" fill="#ffffff" rx="10" />
    <text x="290" y="22" text-anchor="middle" fill="#111111" font-size="13" font-family="sans-serif" font-weight="bold">One Byte = 8 Bits  →  01000001 = 'A' (ASCII 65)</text>

    
    
    <rect x="20" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="50" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="50" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 7</text>

    
    <rect x="85" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="2" />
    <text x="115" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace" font-weight="bold">1</text>
    <text x="115" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 6</text>

    
    <rect x="150" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="180" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="180" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 5</text>

    
    <rect x="215" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="245" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="245" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 4</text>

    
    <rect x="280" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="310" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="310" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 3</text>

    
    <rect x="345" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="375" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="375" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 2</text>

    
    <rect x="410" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1.5" />
    <text x="440" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace">0</text>
    <text x="440" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 1</text>

    
    <rect x="475" y="35" width="60" height="50" rx="5" fill="#ffffff" stroke="#333333" stroke-width="2" />
    <text x="505" y="66" text-anchor="middle" fill="#111111" font-size="22" font-family="monospace" font-weight="bold">1</text>
    <text x="505" y="98" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">bit 0</text>

    
    <line x1="20" y1="116" x2="535" y2="116" stroke="#333333" stroke-width="1.5" />
    <text x="290" y="128" text-anchor="middle" fill="#111111" font-size="10" font-family="sans-serif">← 1 byte (8 bits) →</text>
  </svg>