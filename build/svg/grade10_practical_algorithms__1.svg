<svg viewBox="0 0 300 560" width="300.0" style="max-width:100%;display:block" aria-label="Flowchart: is a colour blue?" height="560.0" xmlns="http://www.w3.org/2000/svg">
        <rect width="300" height="560" fill="#ffffff" rx="10" />
        
        <ellipse cx="150" cy="42" rx="58" ry="24" fill="#ffffff" stroke="#333333" stroke-width="2.5" />
