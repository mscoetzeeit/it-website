        <text x="69" y="395" text-anchor="middle" fill="#111111" font-size="13" font-family="sans-serif" font-weight="bold">is blue"</text>
        <line x1="69" y1="406" x2="69" y2="448" stroke="#333333" stroke-width="2" />
