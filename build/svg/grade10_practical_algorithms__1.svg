        <text x="262" y="220" text-anchor="middle" fill="#111111" font-size="13" font-family="sans-serif" font-weight="bold">No</text>
        <line x1="238" y1="228" x2="278" y2="228" stroke="#333333" stroke-width="2" />
        <line x1="278" y1="228" x2="278" y2="346" stroke="#333333" stroke-width="2" />
        <polygon points="272,344 278,356 284,344" fill="#ffffff" />
