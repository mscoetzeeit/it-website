<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0 0 720 210" width="720.0" height="210.0" style="max-width:100%;font-family:inherit" xmlns="http://www.w3.org/2000/svg">
    <ns0:rect width="720" height="210" rx="8" fill="#ffffff" stroke="#333333" stroke-width="1" />
    
    <ns0:rect x="12" y="12" width="320" height="186" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1" />
    <ns0:text x="172" y="32" text-anchor="middle" fill="#111111" font-size="12" font-weight="700">Without Arrays</ns0:text>
    <ns0:text x="22" y="52" fill="#111111" font-size="9">var</ns0:text>
    <ns0:text x="28" y="65" fill="#111111" font-size="9">iMark1, iMark2, iMark3, iMark4,</ns0:text>
    <ns0:text x="28" y="78" fill="#111111" font-size="9">iMark5, iMark6, iMark7, iMark8,</ns0:text>
    <ns0:text x="28" y="91" fill="#111111" font-size="9">iMark9, iMark10, iMark11, iMark12,</ns0:text>
    <ns0:text x="28" y="104" fill="#111111" font-size="9">iMark13, iMark14, iMark15, iMark16,</ns0:text>
    <ns0:text x="28" y="117" fill="#111111" font-size="9">iMark17, iMark18, iMark19, iMark20,</ns0:text>
    <ns0:text x="28" y="130" fill="#111111" font-size="9">iMark21, iMark22, iMark23, iMark24,</ns0:text>
    <ns0:text x="28" y="143" fill="#111111" font-size="9">iMark25, iMark26, iMark27, iMark28,</ns0:text>
    <ns0:text x="28" y="156" fill="#111111" font-size="9">iMark29, iMark30 : Integer;</ns0:text>
    <ns0:text x="172" y="186" text-anchor="middle" fill="#111111" font-size="9">30 separate variables — hard to loop over!</ns0:text>
    
    <ns0:rect x="348" y="12" width="360" height="186" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1" />
    <ns0:text x="528" y="32" text-anchor="middle" fill="#111111" font-size="12" font-weight="700">With Arrays</ns0:text>
    <ns0:text x="358" y="52" fill="#111111" font-size="9">var</ns0:text>
    <ns0:text x="365" y="68" fill="#111111" font-size="11">arrMarks : array[1..30] of Integer;</ns0:text>
    <ns0:text x="358" y="95" fill="#111111" font-size="9">// Loop through all 30 with 3 lines:</ns0:text>
    <ns0:text x="358" y="112" fill="#111111" font-size="10">for i := 1 to 30 do</ns0:text>
    <ns0:text x="365" y="128" fill="#111111" font-size="10">  iTotal := iTotal + arrMarks[i];</ns0:text>
    <ns0:text x="528" y="186" text-anchor="middle" fill="#111111" font-size="9">One name, 30 values, loops work perfectly!</ns0:text>
  </ns0:svg>